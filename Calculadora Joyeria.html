<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Calculadora · Joyería Aravena</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #05060a;
    --bg-2: #0a0d14;
    --panel: #0f131c;
    --panel-2: #141924;
    --line: #1e2636;
    --line-2: #2a3448;
    --ink: #eaf1fb;
    --ink-dim: #a8b6cc;
    --ink-mute: #6b7a93;
    --gold: #5b9fd6;
    --gold-2: #8ec5ec;
    --gold-deep: #0a2540;
    --silver: #c8d3e0;
    --danger: #e07a7a;
    --radius: 10px;
    --shadow: 0 1px 0 rgba(142,197,236,.06) inset, 0 20px 40px -20px rgba(0,0,0,.85);
    --serif: 'Montserrat', system-ui, sans-serif;
    --mono: 'Montserrat', system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--serif);-webkit-font-smoothing:antialiased;font-feature-settings:"liga","calt","onum"}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(91,159,214,.10), transparent 60%),
      radial-gradient(800px 400px at 100% 100%, rgba(10,37,64,.35), transparent 60%),
      var(--bg);
    padding-bottom: env(safe-area-inset-bottom);
  }
  button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer}
  input,select,textarea{font-family:inherit;color:inherit}
  input:focus,select:focus,textarea:focus{outline:none}

  /* Shell */
  .app{max-width:560px;margin:0 auto;padding:14px 12px 140px;position:relative}
  @media (min-width: 520px){ .app{ padding: 22px 18px 120px; } }
  @media (min-width: 720px){ .app{ max-width: 720px; padding: 32px 28px 120px; } }

  /* Header */
  .brand{display:flex;align-items:center;gap:14px;padding:6px 2px 18px;border-bottom:1px solid var(--line)}
  .mark{
    width:44px;height:44px;border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-2), var(--gold) 45%, var(--gold-deep) 100%);
    box-shadow: 0 0 0 1px var(--line-2), inset 0 1px 0 rgba(255,255,255,.25), 0 8px 20px -8px rgba(91,159,214,.45);
    display:grid;place-items:center;color:#eaf1fb;font-weight:700;font-size:20px;
    font-family:var(--serif);letter-spacing:.02em
  }
  .brand h1{
    margin:0;font-weight:600;font-size:20px;letter-spacing:.04em;line-height:1;text-transform:uppercase;
  }
  .brand h1 em{font-style:normal;color:var(--gold-2);font-weight:300;letter-spacing:.06em}
  .brand .sub{font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.22em;color:var(--ink-mute);text-transform:uppercase;margin-top:6px}

  /* Tabs */
  .tabs{display:flex;gap:2px;margin:14px 0 16px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px;position:sticky;top:6px;z-index:10;backdrop-filter:blur(8px)}
  .tab{
    flex:1;padding:12px 6px;border-radius:999px;font-size:13px;letter-spacing:.02em;
    color:var(--ink-dim);transition:all .2s ease;
    font-family:var(--serif);font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:6px;
    min-height:44px;
  }
  @media (min-width: 520px){ .tab{ font-size:14px; padding:10px 8px; } }
  .tab[aria-selected="true"]{
    background:linear-gradient(180deg, rgba(142,197,236,.15), rgba(91,159,214,.06));
    color:var(--gold-2);
    box-shadow: inset 0 0 0 1px rgba(142,197,236,.22);
  }
  .tab .dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.6}

  /* Cards */
  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .card + .card{margin-top:14px}
  .card-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid var(--line);
  }
  @media (min-width: 520px){ .card-head{ padding:14px 16px; } }
  .card-head h2{
    margin:0;font-weight:600;font-size:14px;letter-spacing:.08em;text-transform:uppercase;
  }
  .card-head h2 em{font-style:normal;color:var(--gold-2);font-weight:300}
  .eyebrow{font-family:var(--mono);font-weight:500;font-size:9.5px;letter-spacing:.22em;color:var(--ink-mute);text-transform:uppercase}

  /* Decorative flourish */
  .flourish{display:flex;align-items:center;gap:10px;color:var(--gold-deep);margin:0 0 4px}
  .flourish::before,.flourish::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line-2),transparent)}
  .flourish span{font-family:var(--mono);font-weight:500;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-mute)}
  .diamond{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 0 2px rgba(91,159,214,.18)}

  /* Lines */
  .lines{padding:6px 8px 10px}
  @media (min-width: 520px){ .lines{ padding:6px 10px 10px; } }
  .line{
    display:grid;
    grid-template-columns: 1fr 96px 40px;
    gap:6px;align-items:stretch;
    padding:10px 4px;
    border-bottom:1px dashed var(--line);
    position:relative;
  }
  @media (min-width: 520px){ .line{ grid-template-columns: 1fr 110px 40px; gap:8px; padding:10px 6px; } }
  .line:last-child{border-bottom:0}
  .line-idx{
    position:absolute;left:-6px;top:12px;
    font-family:var(--mono);font-size:9px;color:var(--ink-mute);letter-spacing:.1em;
    writing-mode:vertical-rl;transform:rotate(180deg);
  }
  .field{
    display:flex;flex-direction:column;gap:4px;
  }
  .field label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--ink-mute);text-transform:uppercase;padding-left:2px}
  .control{
    background:rgba(10,9,7,.5);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:16px;
    color:var(--ink);
    min-height:48px;
    display:flex;align-items:center;
    transition: border-color .15s;
  }
  .control:focus-within, .control:hover{border-color:var(--line-2)}
  .control select, .control input{
    width:100%;background:none;border:0;font-size:16px;font-family:var(--serif);
  }
  .control input[type="number"]{font-family:var(--mono);font-weight:500;font-size:16px;letter-spacing:.02em}
  .control select{appearance:none;padding-right:18px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23a8b6cc' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 2px center}
  .control select option{background:var(--bg-2);color:var(--ink)}
  .unit{color:var(--ink-mute);font-family:var(--mono);font-weight:500;font-size:12px;margin-left:6px}

  .line .remove{
    align-self:stretch;
    display:grid;place-items:center;
    color:var(--ink-mute);
    border:1px solid var(--line);
    border-radius:8px;
    background: rgba(10,9,7,.3);
    margin-top:15px;
    min-width:40px;
    transition: all .15s;
  }
  .line .remove:hover{color:var(--danger);border-color:rgba(224,122,122,.4)}

  .line-meta{
    grid-column: 1 / -1;
    display:flex;justify-content:space-between;align-items:baseline;
    font-family:var(--mono);font-weight:500;font-size:11px;color:var(--ink-mute);letter-spacing:.04em;
    padding: 2px 2px 0;
  }
  .line-meta .price-tag{color:var(--ink-dim)}
  .line-meta .subtotal{color:var(--gold-2);font-size:13px;font-weight:600;letter-spacing:.02em}

  .add-line{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;padding:16px;margin-top:8px;min-height:52px;
    border:1px dashed var(--line-2);border-radius:10px;
    color:var(--ink-dim);font-size:15px;font-weight:500;letter-spacing:.02em;
    background: rgba(91,159,214,.02);
    transition: all .2s;
  }
  .add-line:hover{border-color:var(--gold);color:var(--gold-2);background:rgba(91,159,214,.06)}
  .add-line .plus{width:18px;height:18px;border-radius:50%;border:1px solid currentColor;display:grid;place-items:center;font-size:14px;line-height:1}

  /* Summary */
  .summary{padding:14px 14px 18px}
  @media (min-width: 520px){ .summary{ padding:18px 18px 20px; } }
  .tier{
    display:flex;align-items:center;gap:12px;padding:12px 14px;
    background: linear-gradient(180deg, rgba(91,159,214,.10), rgba(10,37,64,.25));
    border:1px solid rgba(142,197,236,.24);
    border-radius:10px;margin-bottom:14px;
  }
  .tier-badge{
    width:44px;height:44px;border-radius:6px;
    background: linear-gradient(160deg, var(--gold-2), var(--gold) 60%, var(--gold-deep));
    color:#eaf1fb;display:grid;place-items:center;
    font-weight:700;font-size:18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.25);
    position:relative;flex-shrink:0;
  }
  .tier-badge::after{content:"";position:absolute;inset:3px;border:1px solid rgba(234,241,251,.2);border-radius:4px}
  .tier-body{flex:1;min-width:0}
  .tier-body .eyebrow{margin-bottom:2px}
  .tier-body .why{font-size:13px;color:var(--ink-dim);line-height:1.4}
  .tier-body .why strong{color:var(--ink);font-weight:600}

  .totals{display:grid;gap:10px}
  .totals .row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
  .totals .row.grand{
    padding:14px 0 2px;border-top:1px solid var(--line);margin-top:4px;
    align-items:baseline;
  }
  .totals .row .k{font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.18em;color:var(--ink-mute);text-transform:uppercase}
  .totals .row .v{font-family:var(--mono);font-weight:500;font-size:14px;color:var(--ink-dim);letter-spacing:.02em}
  .totals .row.grand .k{color:var(--ink);font-family:var(--serif);font-weight:500;font-size:12px;letter-spacing:.16em;text-transform:uppercase}
  .totals .row.grand .v{
    color:var(--gold-2);font-family:var(--serif);font-size:32px;font-weight:600;letter-spacing:-.01em;
  }
  .totals .row.grand .v .currency{font-family:var(--mono);font-weight:500;font-size:11px;color:var(--ink-mute);letter-spacing:.15em;margin-right:6px;vertical-align:middle}

  /* Huge total on mobile */
  .totals .row.grand{
    padding:16px 0 4px;border-top:1px solid var(--line);margin-top:6px;
    flex-direction:column;align-items:flex-start;gap:4px;
  }
  .totals .row.grand .k{color:var(--ink);font-family:var(--serif);font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase}
  .totals .row.grand .v{
    color:var(--gold-2);font-family:var(--serif);font-size:44px;font-weight:700;letter-spacing:-.02em;line-height:1;
  }
  @media (min-width: 520px){
    .totals .row.grand{flex-direction:row;align-items:baseline;gap:0}
    .totals .row.grand .v{font-size:36px}
  }
  .totals .row.grand .v .currency{font-family:var(--mono);font-weight:500;font-size:11px;color:var(--ink-mute);letter-spacing:.15em;margin-right:6px;vertical-align:middle}

  /* Actions */
  .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .btn{
    flex:1;min-width:120px;
    padding:14px 18px;border-radius:999px;
    font-size:15px;font-weight:600;letter-spacing:.02em;
    border:1px solid var(--line-2);background:var(--panel);
    color:var(--ink);transition:all .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
    min-height:52px;
  }
  .btn:hover{border-color:var(--gold);color:var(--gold-2)}
  .btn.primary{
    background:linear-gradient(180deg, var(--gold) 0%, #3a7bb0 55%, var(--gold-deep));
    color:#ffffff;border-color:transparent;font-weight:600;letter-spacing:.04em;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 6px 16px -6px rgba(91,159,214,.55);
  }
  .btn.primary:hover{filter:brightness(1.12);color:#fff}
  .btn.accent{
    background:linear-gradient(180deg, #8ec5ec 0%, #5b9fd6 70%, #3a7bb0);
    color:#0a2540;border-color:transparent;font-weight:700;letter-spacing:.04em;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 8px 20px -6px rgba(142,197,236,.5);
  }
  .btn.accent:hover{filter:brightness(1.08);color:#0a2540}
  .btn.ghost{background:transparent}
  .btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.3)}

  /* Empty state */
  .empty{
    text-align:center;padding:40px 20px;color:var(--ink-mute);
  }
  .empty .diamond{margin:0 auto 12px}
  .empty p{font-size:14px;margin:6px 0;color:var(--ink-dim)}
  .empty .hint{font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin-top:10px}

  /* History */
  .history-search{
    display:flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:10px 14px;margin-bottom:12px;
  }
  .history-search input{
    flex:1;background:none;border:0;font-size:15px;color:var(--ink);font-family:var(--serif);
  }
  .history-search input::placeholder{color:var(--ink-mute)}
  .history-search svg{flex-shrink:0;color:var(--ink-mute)}

  .quote{
    padding:14px 14px;border-bottom:1px solid var(--line);
  }
  .quote:last-child{border-bottom:0}
  .quote-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .quote-name{font-size:15px;font-weight:600;letter-spacing:.01em}
  .quote-name em{color:var(--ink-mute);font-weight:400;font-size:13px;font-style:normal}
  .quote-date{font-family:var(--mono);font-weight:500;font-size:10px;color:var(--ink-mute);letter-spacing:.1em;white-space:nowrap}
  .quote-lines{font-size:13px;color:var(--ink-dim);margin:6px 0 10px;line-height:1.5}
  .quote-lines .sep{color:var(--line-2);margin:0 6px}
  .quote-foot{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .quote-total{
    font-size:20px;color:var(--gold-2);font-weight:600;letter-spacing:-.01em;
  }
  .quote-total .currency{font-family:var(--mono);font-weight:500;font-size:10px;color:var(--ink-mute);letter-spacing:.15em;margin-right:4px}
  .quote-tier{
    display:inline-flex;align-items:center;gap:6px;
    font-family:var(--mono);font-weight:500;font-size:10px;color:var(--gold-2);letter-spacing:.15em;
    padding:3px 8px;border:1px solid rgba(91,159,214,.32);border-radius:999px;
    text-transform:uppercase;
  }
  .quote-actions{display:flex;gap:6px}
  .icon-btn{
    width:40px;height:40px;border-radius:50%;
    border:1px solid var(--line);background:var(--panel);
    display:grid;place-items:center;color:var(--ink-dim);
    transition:all .15s;
  }
  .icon-btn:hover{border-color:var(--gold);color:var(--gold-2)}
  .icon-btn.danger:hover{border-color:rgba(224,122,122,.4);color:var(--danger)}

  /* Price table */
  .ptable{padding:4px 0 10px}
  .ptable-row{
    padding:12px 14px;border-bottom:1px solid var(--line);
  }
  @media (min-width: 520px){ .ptable-row{ padding:14px 16px; } }
  .ptable-row:last-child{border-bottom:0}
  .ptable-name{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:14px;font-weight:600;margin-bottom:10px;gap:8px;
  }
  @media (min-width: 520px){ .ptable-name{ font-size:15.5px; } }
  .ptable-name .mat{font-family:var(--mono);font-weight:500;font-size:10px;color:var(--gold-2);letter-spacing:.15em;flex-shrink:0}
  .ptable-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
  }
  .ptable-cell{
    padding:8px 4px;border-radius:6px;
    background:rgba(10,9,7,.4);
    border:1px solid var(--line);
    text-align:center;position:relative;
    transition:all .15s;
  }
  @media (min-width: 520px){ .ptable-cell{ padding:10px 8px; } }
  .ptable-cell.active{
    background:linear-gradient(180deg, rgba(91,159,214,.14), rgba(10,37,64,.35));
    border-color:rgba(142,197,236,.38);
  }
  .ptable-cell .t{
    font-family:var(--mono);font-weight:500;font-size:9px;letter-spacing:.18em;
    color:var(--ink-mute);text-transform:uppercase;
  }
  .ptable-cell.active .t{color:var(--gold-2)}
  .ptable-cell .p{
    font-size:13px;color:var(--ink);margin-top:4px;font-weight:700;letter-spacing:-.01em;
  }
  @media (min-width: 520px){ .ptable-cell .p{ font-size:14px; } }
  .ptable-cell .p input{
    width:100%;background:none;border:0;text-align:center;font-size:16px;color:inherit;font-weight:700;
    font-family:var(--serif);padding:2px 0;
  }
  .ptable-cell .unit{display:block;font-size:9px;font-family:var(--mono);font-weight:500;color:var(--ink-mute);letter-spacing:.1em;margin-top:2px}

  .tiers-legend{
    padding:14px 16px;border-top:1px solid var(--line);
    background: rgba(10,9,7,.3);
    border-radius:0 0 10px 10px;
  }
  .tiers-legend h3{
    margin:0 0 10px;font-weight:600;font-size:11px;color:var(--ink-dim);letter-spacing:.16em;text-transform:uppercase;
  }
  .tiers-legend ul{margin:0;padding:0;list-style:none;display:grid;gap:6px}
  .tiers-legend li{
    display:flex;align-items:flex-start;gap:10px;
    font-family:var(--mono);font-weight:500;font-size:11px;color:var(--ink-dim);letter-spacing:.02em;line-height:1.5;
  }
  .tiers-legend li .t{color:var(--gold-2);flex-shrink:0;min-width:50px}

  /* Toast */
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translate(-50%, 30px);
    background:var(--panel-2);border:1px solid rgba(142,197,236,.32);
    color:var(--gold-2);padding:10px 18px;border-radius:999px;
    font-size:13px;font-weight:500;letter-spacing:.02em;
    box-shadow:0 20px 40px -15px rgba(0,0,0,.85);
    opacity:0;pointer-events:none;transition:all .3s;
    z-index:100;
  }
  .toast.show{opacity:1;transform:translate(-50%, 0)}

  /* FAB - mobile only */
  .fab{
    position:fixed;right:14px;bottom:18px;z-index:60;
    display:flex;align-items:center;gap:8px;
    padding:14px 20px;min-height:54px;border-radius:999px;
    background:linear-gradient(180deg, #8ec5ec 0%, #5b9fd6 70%, #3a7bb0);
    color:#0a2540;font-weight:700;font-size:15px;letter-spacing:.02em;
    box-shadow: 0 12px 28px -8px rgba(142,197,236,.55), inset 0 1px 0 rgba(255,255,255,.4);
    border:0;transition:all .2s;
  }
  .fab:active{transform:scale(.97)}
  .fab:disabled{opacity:0;pointer-events:none;transform:translateY(10px)}
  .fab .ico{font-size:18px}
  @media (min-width: 560px){ .fab{display:none} }

  /* Client card */
  .client{
    padding:14px 16px;
  }
  .client-row{display:grid;grid-template-columns:1fr;gap:10px}
  @media (min-width: 520px){ .client-row{grid-template-columns:1fr 1fr} }
  .control-labeled{
    display:flex;flex-direction:column;gap:4px;
  }
  .control-labeled label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--ink-mute);text-transform:uppercase;padding-left:2px}

  /* Tweaks panel */
  .tweaks{
    position:fixed;right:14px;bottom:14px;z-index:50;
    width:min(320px, calc(100vw - 28px));
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line-2);border-radius:14px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.9), inset 0 1px 0 rgba(232,201,135,.08);
    display:none;overflow:hidden;
  }
  .tweaks.open{display:block}
  .tweaks-head{
    padding:12px 14px;display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid var(--line);
  }
  .tweaks-head strong{font-size:12px;color:var(--gold-2);font-weight:600;letter-spacing:.14em;text-transform:uppercase}
  .tweaks-body{padding:10px 14px 14px;max-height:50vh;overflow:auto}
  .tweak-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .tweak-row:last-child{border-bottom:0}
  .tweak-row label{font-size:12px;color:var(--ink-dim)}

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ---------- Data ----------
const DEFAULT_PRICES = JSON.parse(document.getElementById('default-prices').textContent);
const CATEGORY_ORDER = Object.keys(DEFAULT_PRICES);

const TIER_RULES = [
  { label: "I",   min: 0,       desc: "Hasta $30.000" },
  { label: "II",  min: 30001,   desc: "Supera $30.000" },
  { label: "III", min: 100001,  desc: "Supera $100.000 o 500g+" },
  { label: "IV",  min: Infinity, desc: "Supera 1.000g" },
];

const LS_HISTORY = "joya.history.v1";
const LS_PRICES  = "joya.prices.v1";
const LS_TAB     = "joya.tab.v1";

// ---------- Utils ----------
const fmtCLP = (n) => {
  if (!isFinite(n)) n = 0;
  return new Intl.NumberFormat('es-CL', { maximumFractionDigits: 0 }).format(Math.round(n));
};
const fmtDate = (t) => {
  const d = new Date(t);
  return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' }).replace('.','') +
         ' · ' + d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
};
const uid = () => Math.random().toString(36).slice(2, 9);

// Compute tier given total price and total weight. 0-indexed.
function tierFor(total, weight){
  if (weight > 1000) return 3;
  if (weight > 500) return 2;
  if (total > 100000) return 2;
  if (total > 30000) return 1;
  return 0;
}

// Iteratively converge on a tier. Total depends on tier which depends on total.
// Strategy: for each possible tier t, compute total at tier t and check if the
// resulting rule gives back t. Take the HIGHEST t that is self-consistent.
// If none is self-consistent, the rules produce a cascade — fall back to the
// tier the total at tier 0 points to.
function computeTotals(lines, prices){
  const totalWeight = lines.reduce((s,l) => s + (Number(l.grams)||0), 0);

  // Weight-based overrides: if weight > 1000, tier 3; if >500, tier 2 (but may bump higher if price suggests).
  let weightTier = 0;
  if (totalWeight > 1000) weightTier = 3;
  else if (totalWeight > 500) weightTier = 2;

  // Try tiers from 3 down to 0 looking for self-consistency.
  let chosen = null;
  for (let t = 3; t >= 0; t--) {
    const total = lines.reduce((s,l) => {
      const cat = prices[l.category];
      if (!cat) return s;
      const price = cat.prices[t] || 0;
      return s + price * (Number(l.grams)||0);
    }, 0);
    const derived = tierFor(total, totalWeight);
    // Tier is the max of weight and price rules
    const effective = Math.max(derived, weightTier);
    if (effective === t) { chosen = { tier: t, total }; break; }
  }
  if (!chosen) {
    // Fallback: use tier 0 pricing then map
    const total0 = lines.reduce((s,l) => {
      const cat = prices[l.category];
      if (!cat) return s;
      return s + (cat.prices[0]||0) * (Number(l.grams)||0);
    }, 0);
    const t = Math.max(tierFor(total0, totalWeight), weightTier);
    const total = lines.reduce((s,l) => {
      const cat = prices[l.category];
      if (!cat) return s;
      return s + (cat.prices[t]||0) * (Number(l.grams)||0);
    }, 0);
    chosen = { tier: t, total };
  }

  // Reason string
  let reason;
  const t = chosen.tier;
  if (totalWeight > 1000) reason = `Peso total ${fmtCLP(totalWeight)}g supera 1.000g`;
  else if (totalWeight > 500 && t >= 2) reason = `Peso total ${fmtCLP(totalWeight)}g supera 500g`;
  else if (t === 3) reason = `Total supera $100.000 con peso ≥ 500g`;
  else if (t === 2) reason = `Total supera $100.000`;
  else if (t === 1) reason = `Total supera $30.000`;
  else reason = `Total hasta $30.000`;

  return { ...chosen, totalWeight, reason };
}

// ---------- Icons ----------
const Icon = ({ name, size=16 }) => {
  const common = { width:size, height:size, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:1.5, strokeLinecap:"round", strokeLinejoin:"round" };
  switch(name){
    case 'calc': return <svg {...common}><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 7h8M8 11h3M13 11h3M8 15h3M13 15h3M8 19h3M13 19h3"/></svg>;
    case 'clock': return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case 'list': return <svg {...common}><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>;
    case 'trash': return <svg {...common}><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a2 2 0 002 2h6a2 2 0 002-2l1-13M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>;
    case 'copy': return <svg {...common}><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V5a1 1 0 00-1-1H5a1 1 0 00-1 1v10a1 1 0 001 1h3"/></svg>;
    case 'share': return <svg {...common}><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>;
    case 'search': return <svg {...common}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;
    case 'x': return <svg {...common}><path d="M6 6l12 12M18 6L6 18"/></svg>;
    case 'sliders': return <svg {...common}><path d="M4 6h10M18 6h2M4 12h2M10 12h10M4 18h14M20 18h0"/><circle cx="16" cy="6" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="18" cy="18" r="2"/></svg>;
    default: return null;
  }
};

// ---------- App ----------
function App(){
  const [tab, setTab] = useState(() => localStorage.getItem(LS_TAB) || 'calc');
  const [prices, setPrices] = useState(() => {
    try { const s = localStorage.getItem(LS_PRICES); if (s) return JSON.parse(s); } catch(e){}
    return DEFAULT_PRICES;
  });
  const [history, setHistory] = useState(() => {
    try { const s = localStorage.getItem(LS_HISTORY); if (s) return JSON.parse(s); } catch(e){}
    return [];
  });

  const [clientName, setClientName] = useState("");
  const [lines, setLines] = useState([
    { id: uid(), category: CATEGORY_ORDER[0], grams: "" }
  ]);

  const [toast, setToast] = useState("");
  const toastTimer = useRef(null);
  const showToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), 2200);
  }, []);

  // Tweaks state
  const [editMode, setEditMode] = useState(false);
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Persistence
  useEffect(() => { localStorage.setItem(LS_TAB, tab); }, [tab]);
  useEffect(() => { localStorage.setItem(LS_PRICES, JSON.stringify(prices)); }, [prices]);
  useEffect(() => { localStorage.setItem(LS_HISTORY, JSON.stringify(history)); }, [history]);

  const totals = useMemo(() => computeTotals(lines, prices), [lines, prices]);

  const addLine = () => setLines(ls => [...ls, { id: uid(), category: CATEGORY_ORDER[0], grams: "" }]);
  const removeLine = (id) => setLines(ls => ls.length > 1 ? ls.filter(l => l.id !== id) : ls);
  const updateLine = (id, patch) => setLines(ls => ls.map(l => l.id === id ? { ...l, ...patch } : l));

  const resetCalc = () => {
    setLines([{ id: uid(), category: CATEGORY_ORDER[0], grams: "" }]);
    setClientName("");
  };

  const hasValidLines = lines.some(l => Number(l.grams) > 0);

  const copyMessage = async () => {
    const validLines = lines.filter(l => Number(l.grams) > 0);
    if (validLines.length === 0) return;
    const piezas = validLines.map(l => {
      const name = prices[l.category]?.name || l.category;
      return `- ${name}: ${l.grams}g`;
    }).join('\n');
    const msg =
`Pago: Benjamín
Atención: 
Agenda: 
Nombre Cliente: ${clientName.trim()}

Joyas:
${piezas}

Venta: $${fmtCLP(totals.total)}`;
    try {
      await navigator.clipboard.writeText(msg);
      showToast("¡Mensaje copiado!");
    } catch (e) {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = msg; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast("¡Mensaje copiado!"); } catch(_){ showToast("No se pudo copiar"); }
      document.body.removeChild(ta);
    }
  };

  const saveQuote = () => {
    const validLines = lines.filter(l => Number(l.grams) > 0);
    if (validLines.length === 0) { showToast("Agrega al menos una línea con gramaje"); return; }
    const entry = {
      id: uid(),
      at: Date.now(),
      client: clientName.trim(),
      lines: validLines.map(l => ({ category: l.category, grams: Number(l.grams) })),
      tier: totals.tier,
      total: totals.total,
      totalWeight: totals.totalWeight,
    };
    setHistory(h => [entry, ...h]);
    showToast("Cotización guardada");
  };

  const loadQuote = (q) => {
    setClientName(q.client || "");
    setLines(q.lines.map(l => ({ id: uid(), category: l.category, grams: String(l.grams) })));
    setTab('calc');
    showToast("Cotización cargada");
  };

  const deleteQuote = (id) => setHistory(h => h.filter(q => q.id !== id));

  const shareQuote = (q) => {
    const p = prices;
    const lines = q.lines.map(l => {
      const cat = p[l.category];
      const price = cat ? cat.prices[q.tier] : 0;
      return `• ${cat ? cat.name : l.category} — ${l.grams}g × $${fmtCLP(price)} = $${fmtCLP(price * l.grams)}`;
    }).join('\n');
    const text =
`✨ Cotización${q.client ? ' · ' + q.client : ''}
${fmtDate(q.at)}

${lines}

Peso total: ${fmtCLP(q.totalWeight)}g
Tramo: ${TIER_RULES[q.tier].label}
Total: $${fmtCLP(q.total)} CLP`;
    const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
    window.open(url, '_blank');
  };

  return (
    <div className="app">
      <header className="brand">
        <div className="mark" aria-hidden>◆</div>
        <div>
          <h1>Joyería <em>Aravena</em></h1>
          <div className="sub">Calculadora · Cotizaciones</div>
        </div>
      </header>

      <nav className="tabs" role="tablist">
        <button className="tab" role="tab" aria-selected={tab==='calc'} onClick={()=>setTab('calc')}>
          <Icon name="calc" size={14}/> Calculadora
        </button>
        <button className="tab" role="tab" aria-selected={tab==='hist'} onClick={()=>setTab('hist')}>
          <Icon name="clock" size={14}/> Historial
        </button>
        <button className="tab" role="tab" aria-selected={tab==='prices'} onClick={()=>setTab('prices')}>
          <Icon name="list" size={14}/> Precios
        </button>
      </nav>

      {tab === 'calc' && (
        <CalcTab
          clientName={clientName} setClientName={setClientName}
          lines={lines} prices={prices}
          addLine={addLine} removeLine={removeLine} updateLine={updateLine}
          totals={totals} resetCalc={resetCalc} saveQuote={saveQuote}
          copyMessage={copyMessage} canCopy={hasValidLines}
        />
      )}
      {tab === 'hist' && (
        <HistoryTab
          history={history} prices={prices}
          onDelete={deleteQuote} onDuplicate={loadQuote} onShare={shareQuote}
        />
      )}
      {tab === 'prices' && (
        <PricesTab prices={prices} setPrices={setPrices} activeTier={totals.tier} />
      )}

      <div className={"toast" + (toast ? " show" : "")}>{toast}</div>

      {tab === 'calc' && (
        <button className="fab" onClick={() => {
          const validLines = lines.filter(l => Number(l.grams) > 0);
          if (validLines.length === 0) return;
          const piezas = validLines.map(l => {
            const name = prices[l.category]?.name || l.category;
            return `- ${name}: ${l.grams}g`;
          }).join('\n');
          const msg = `Pago: Benjamín\nAtención: \nAgenda: \nNombre Cliente: ${clientName.trim()}\n\nJoyas:\n${piezas}\n\nVenta: $${fmtCLP(totals.total)}`;
          navigator.clipboard.writeText(msg).then(
            () => showToast("¡Mensaje copiado!"),
            () => showToast("No se pudo copiar")
          );
        }} disabled={!lines.some(l => Number(l.grams) > 0)}>
          <span className="ico">📋</span> Copiar mensaje
        </button>
      )}

      {editMode && <TweaksPanel prices={prices} setPrices={setPrices} onClose={()=>setEditMode(false)} />}
    </div>
  );
}

// ---------- Calculator Tab ----------
function CalcTab({ clientName, setClientName, lines, prices, addLine, removeLine, updateLine, totals, resetCalc, saveQuote, copyMessage, canCopy }){
  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-head">
          <h2>Cliente <em>&amp;</em> piezas</h2>
          <span className="eyebrow">N.º {lines.length}</span>
        </div>
        <div className="client">
          <div className="control-labeled">
            <label>Nombre del cliente (opcional)</label>
            <div className="control">
              <input
                type="text"
                value={clientName}
                onChange={e => setClientName(e.target.value)}
                placeholder="Ej. María Fernández"
              />
            </div>
          </div>
        </div>

        <div className="lines">
          {lines.map((line, i) => {
            const cat = prices[line.category];
            const price = cat ? cat.prices[totals.tier] : 0;
            const g = Number(line.grams) || 0;
            const sub = price * g;
            return (
              <div className="line" key={line.id}>
                <span className="line-idx">N°{String(i+1).padStart(2,'0')}</span>
                <div className="field">
                  <label>Categoría</label>
                  <div className="control">
                    <select value={line.category} onChange={e => updateLine(line.id, { category: e.target.value })}>
                      {CATEGORY_ORDER.map(k => (
                        <option key={k} value={k}>{prices[k].name}</option>
                      ))}
                    </select>
                  </div>
                </div>
                <div className="field">
                  <label>Gramaje</label>
                  <div className="control">
                    <input
                      type="number"
                      inputMode="decimal"
                      step="0.01"
                      min="0"
                      value={line.grams}
                      onChange={e => updateLine(line.id, { grams: e.target.value })}
                      placeholder="0"
                    />
                    <span className="unit">g</span>
                  </div>
                </div>
                <button className="remove" onClick={() => removeLine(line.id)} aria-label="Eliminar línea" disabled={lines.length === 1}>
                  <Icon name="x" size={14}/>
                </button>
                <div className="line-meta">
                  <span className="price-tag">${fmtCLP(price)}/g · tramo {TIER_RULES[totals.tier].label}</span>
                  <span className="subtotal">${fmtCLP(sub)}</span>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{padding:'0 16px 16px'}}>
          <button className="add-line" onClick={addLine}>
            <span className="plus">+</span> Añadir línea
          </button>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <h2>Resumen</h2>
          <span className="eyebrow">Cálculo automático</span>
        </div>
        <div className="summary">
          <div className="tier">
            <div className="tier-badge">{TIER_RULES[totals.tier].label}</div>
            <div className="tier-body">
              <div className="eyebrow">Tramo aplicado</div>
              <div className="why"><strong>{TIER_RULES[totals.tier].desc}.</strong> {totals.reason}.</div>
            </div>
          </div>
          <div className="totals">
            <div className="row">
              <span className="k">Peso total</span>
              <span className="v">{fmtCLP(totals.totalWeight)} g</span>
            </div>
            <div className="row">
              <span className="k">Líneas</span>
              <span className="v">{lines.filter(l => Number(l.grams) > 0).length} de {lines.length}</span>
            </div>
            <div className="row grand">
              <span className="k">Total</span>
              <span className="v"><span className="currency">CLP</span>${fmtCLP(totals.total)}</span>
            </div>
          </div>
          <div className="actions">
            <button className="btn ghost" onClick={resetCalc}>Limpiar</button>
            <button className="btn primary" onClick={saveQuote}>Guardar cotización</button>
            <button className="btn accent" onClick={copyMessage} disabled={!canCopy} style={{flexBasis:'100%'}}>
              <span style={{fontSize:'18px'}}>📋</span> Copiar mensaje
            </button>
          </div>
        </div>
      </div>

      <div className="flourish" style={{margin:'26px 0 0'}}>
        <span>Aravena · Orfebrería</span>
      </div>
    </div>
  );
}

// ---------- History Tab ----------
function HistoryTab({ history, prices, onDelete, onDuplicate, onShare }){
  const [q, setQ] = useState("");
  const filtered = useMemo(() => {
    const needle = q.trim().toLowerCase();
    if (!needle) return history;
    return history.filter(h =>
      (h.client || '').toLowerCase().includes(needle) ||
      h.lines.some(l => ((prices[l.category] && prices[l.category].name) || '').toLowerCase().includes(needle))
    );
  }, [q, history, prices]);

  return (
    <div className="fade-in">
      <div className="history-search">
        <Icon name="search" size={15}/>
        <input
          type="text" placeholder="Buscar por cliente o categoría…"
          value={q} onChange={e => setQ(e.target.value)}
        />
        {q && <button className="icon-btn" style={{width:28,height:28}} onClick={()=>setQ("")} aria-label="Limpiar búsqueda"><Icon name="x" size={12}/></button>}
      </div>

      {filtered.length === 0 ? (
        <div className="card">
          <div className="empty">
            <div className="diamond"/>
            <p>{history.length === 0 ? "Aún no hay cotizaciones guardadas." : "Sin resultados."}</p>
            <div className="hint">{history.length === 0 ? "Crea una desde la Calculadora" : "Prueba otra búsqueda"}</div>
          </div>
        </div>
      ) : (
        <div className="card">
          {filtered.map(h => (
            <div className="quote" key={h.id}>
              <div className="quote-head">
                <div className="quote-name">
                  {h.client || <em>Sin cliente</em>}
                </div>
                <div className="quote-date">{fmtDate(h.at)}</div>
              </div>
              <div className="quote-lines">
                {h.lines.map((l, i) => (
                  <React.Fragment key={i}>
                    {i > 0 && <span className="sep">·</span>}
                    {(prices[l.category] && prices[l.category].name) || l.category} <span style={{fontStyle:'normal',fontFamily:'var(--mono)',fontSize:11}}>{l.grams}g</span>
                  </React.Fragment>
                ))}
              </div>
              <div className="quote-foot">
                <div>
                  <div className="quote-total"><span className="currency">CLP</span>${fmtCLP(h.total)}</div>
                  <div className="quote-tier" style={{marginTop:4}}>◆ Tramo {TIER_RULES[h.tier].label}</div>
                </div>
                <div className="quote-actions">
                  <button className="icon-btn" onClick={()=>onShare(h)} aria-label="Compartir por WhatsApp"><Icon name="share" size={14}/></button>
                  <button className="icon-btn" onClick={()=>onDuplicate(h)} aria-label="Duplicar"><Icon name="copy" size={14}/></button>
                  <button className="icon-btn danger" onClick={()=>{ if (confirm('¿Eliminar esta cotización?')) onDelete(h.id); }} aria-label="Eliminar"><Icon name="trash" size={14}/></button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="flourish" style={{margin:'26px 0 0'}}>
        <span>{history.length} cotización{history.length === 1 ? '' : 'es'} guardada{history.length === 1 ? '' : 's'}</span>
      </div>
    </div>
  );
}

// ---------- Prices Tab ----------
function PricesTab({ prices, setPrices, activeTier }){
  const [editing, setEditing] = useState(false);

  const updatePrice = (key, tierIdx, val) => {
    setPrices(p => {
      const copy = { ...p, [key]: { ...p[key], prices: [...p[key].prices] } };
      copy[key].prices[tierIdx] = Number(val) || 0;
      return copy;
    });
  };

  const resetPrices = () => {
    if (confirm('¿Restaurar precios por defecto?')) setPrices(DEFAULT_PRICES);
  };

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-head">
          <h2>Tabla de <em>precios</em></h2>
          <div style={{display:'flex',gap:6}}>
            <button className="icon-btn" onClick={()=>setEditing(e=>!e)} aria-label="Editar">
              {editing ? <Icon name="x" size={14}/> : <Icon name="sliders" size={14}/>}
            </button>
          </div>
        </div>
        <div className="ptable">
          {CATEGORY_ORDER.map(key => {
            const cat = prices[key];
            return (
              <div className="ptable-row" key={key}>
                <div className="ptable-name">
                  <span>{cat.name}</span>
                  <span className="mat">{cat.material}</span>
                </div>
                <div className="ptable-grid">
                  {cat.prices.map((p, i) => (
                    <div className={"ptable-cell" + (i === activeTier ? ' active' : '')} key={i}>
                      <div className="t">T{TIER_RULES[i].label}</div>
                      <div className="p">
                        {editing ? (
                          <input
                            type="number"
                            value={p}
                            onChange={e => updatePrice(key, i, e.target.value)}
                            min="0"
                          />
                        ) : `$${fmtCLP(p)}`}
                      </div>
                      <span className="unit">CLP / g</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
        <div className="tiers-legend">
          <h3>Reglas de tramo</h3>
          <ul>
            <li><span className="t">T-I</span><span>Compra hasta $30.000</span></li>
            <li><span className="t">T-II</span><span>Compra supera $30.000</span></li>
            <li><span className="t">T-III</span><span>Compra supera $100.000 · o peso supera 500g</span></li>
            <li><span className="t">T-IV</span><span>Peso supera 1.000g</span></li>
          </ul>
        </div>
      </div>

      {editing && (
        <div className="actions" style={{marginTop:14}}>
          <button className="btn ghost" onClick={resetPrices}>Restaurar precios</button>
          <button className="btn primary" onClick={()=>setEditing(false)}>Listo</button>
        </div>
      )}

      <div className="flourish" style={{margin:'26px 0 0'}}>
        <span>Tarifa vigente · por gramo</span>
      </div>
    </div>
  );
}

// ---------- Tweaks (host toolbar) ----------
function TweaksPanel({ prices, setPrices, onClose }){
  const [cat, setCat] = useState(CATEGORY_ORDER[0]);
  return (
    <div className="tweaks open">
      <div className="tweaks-head">
        <strong>◆ Tweaks</strong>
        <button className="icon-btn" onClick={onClose} style={{width:28,height:28}}><Icon name="x" size={12}/></button>
      </div>
      <div className="tweaks-body">
        <div className="tweak-row">
          <label>Categoría</label>
          <select value={cat} onChange={e=>setCat(e.target.value)}>
            {CATEGORY_ORDER.map(k => <option key={k} value={k}>{prices[k].name}</option>)}
          </select>
        </div>
        {[0,1,2,3].map(i => (
          <div className="tweak-row" key={i}>
            <label>Tramo {TIER_RULES[i].label} (CLP/g)</label>
            <input
              type="number"
              value={prices[cat].prices[i]}
              onChange={e => {
                const v = Number(e.target.value) || 0;
                setPrices(p => {
                  const copy = { ...p, [cat]: { ...p[cat], prices: [...p[cat].prices] } };
                  copy[cat].prices[i] = v;
                  return copy;
                });
              }}
            />
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
